version: '3.8'

services:
  # ──────────────────────────────────────────
  # Dify — Database
  # ──────────────────────────────────────────
  dify-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DIFY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DIFY_DB_NAME:-dify}
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIFY_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass difyai123456
    volumes:
      - dify-redis-data:/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "difyai123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant — vector store for Dify
  dify-qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - dify-qdrant-data:/qdrant/storage
    networks:
      - ai-net

  # ──────────────────────────────────────────
  # Dify — API & Worker
  # ──────────────────────────────────────────
  dify-api:
    image: langgenius/dify-api:0.9.1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MODE: api
      MIGRATION_ENABLED: 'true'
      SECRET_KEY: ${DIFY_SECRET_KEY:-your-secret-key-change-me-32chars}
      LOG_LEVEL: INFO
      # Public URLs shown in Dify UI
      CONSOLE_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      CONSOLE_WEB_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      APP_WEB_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      SERVICE_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      # DB
      DB_USERNAME: ${DIFY_DB_USER:-postgres}
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_DB_NAME:-dify}
      # Redis / Celery
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: difyai123456
      CELERY_BROKER_URL: redis://:difyai123456@dify-redis:6379/1
      BROKER_USE_SSL: 'false'
      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      # CORS
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      # Vector DB — Qdrant
      VECTOR_STORE: qdrant
      QDRANT_URL: http://dify-qdrant:6333
      QDRANT_API_KEY: ""
      # Sandbox
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_KEY:-dify-sandbox}
      # SSRF proxy (disabled)
      SSRF_PROXY_HTTP_URL: ""
      SSRF_PROXY_HTTPS_URL: ""
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - ai-net
    ports:
      - "5001:5001"

  dify-worker:
    image: langgenius/dify-api:0.9.1
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY:-your-secret-key-change-me-32chars}
      CONSOLE_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      CONSOLE_WEB_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      APP_WEB_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      SERVICE_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      DB_USERNAME: ${DIFY_DB_USER:-postgres}
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_DB_NAME:-dify}
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: difyai123456
      CELERY_BROKER_URL: redis://:difyai123456@dify-redis:6379/1
      BROKER_USE_SSL: 'false'
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      VECTOR_STORE: qdrant
      QDRANT_URL: http://dify-qdrant:6333
      QDRANT_API_KEY: ""
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_KEY:-dify-sandbox}
      SSRF_PROXY_HTTP_URL: ""
      SSRF_PROXY_HTTPS_URL: ""
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - ai-net

  dify-web:
    image: langgenius/dify-web:0.9.1
    restart: always
    environment:
      CONSOLE_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
      APP_API_URL: ${DIFY_WEB_URL:-http://localhost:3000}
    volumes:
      - ./dify-web-init.sh:/dify-web-init.sh:ro
    entrypoint: ["/bin/sh", "/dify-web-init.sh"]
    networks:
      - ai-net
    # port 3000 透過 dify-nginx 對外，不直接暴露

  dify-nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - dify-web
      - dify-api
    networks:
      - ai-net

  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.9
    restart: always
    environment:
      API_KEY: ${DIFY_SANDBOX_KEY:-dify-sandbox}
      GIN_MODE: release
    networks:
      - ai-net

  # ──────────────────────────────────────────
  # Ollama — LLM Engine
  # ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull ${OLLAMA_MODEL:-llama3.1:8b} && wait"]
    # 若有 NVIDIA GPU，取消下方註解：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ──────────────────────────────────────────
  # AnythingLLM
  # ──────────────────────────────────────────
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    restart: always
    cap_add:
      - SYS_ADMIN
    environment:
      STORAGE_DIR: /app/server/storage
      JWT_SECRET: ${ANYTHINGLLM_JWT_SECRET:-anythingllm-jwt-secret-change-me}
      LLM_PROVIDER: ollama
      OLLAMA_BASE_PATH: http://ollama:11434
      OLLAMA_MODEL_PREF: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_MODEL_TOKEN_LIMIT: 4096
      EMBEDDING_ENGINE: native
      VECTOR_DB: lancedb
    volumes:
      - anythingllm-storage:/app/server/storage
    depends_on:
      - ollama
    networks:
      - ai-net
    ports:
      - "3001:3001"

  # ──────────────────────────────────────────
  # Webhook Bridge — Config DB
  # ──────────────────────────────────────────
  webhook-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook
    volumes:
      - webhook-db-data:/var/lib/postgresql/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Webhook Bridge
  # ──────────────────────────────────────────
  webhook-bridge:
    build: ./webhook-bridge
    restart: always
    environment:
      PORT: 3100
      DIFY_API_BASE: http://dify-api:5001
      ANYTHINGLLM_BASE: http://anythingllm:3001
      LIVECHAT_ACTIVE_PLATFORM: ${LIVECHAT_ACTIVE_PLATFORM:-both}
      # Initial API keys — seeded into DB on first run, managed via Demo UI thereafter
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY:-}
      ANYTHINGLLM_WORKSPACE: ${ANYTHINGLLM_WORKSPACE:-default}
      LIVECHAT_LICENSE_ID: ${LIVECHAT_LICENSE_ID:-}
      LIVECHAT_TOKEN: ${LIVECHAT_TOKEN:-}
      # Intent Router API keys
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY:-}
      # Config DB
      WEBHOOK_DB_HOST: webhook-db
      WEBHOOK_DB_PORT: 5432
      WEBHOOK_DB_NAME: webhook
      WEBHOOK_DB_USER: webhook
      WEBHOOK_DB_PASSWORD: webhook
    depends_on:
      webhook-db:
        condition: service_healthy
      dify-api:
        condition: service_started
      anythingllm:
        condition: service_started
    networks:
      - ai-net
    ports:
      - "3100:3100"

  # ──────────────────────────────────────────
  # Demo Dashboard
  # ──────────────────────────────────────────
  demo-ui:
    build: ./demo-ui
    restart: always
    networks:
      - ai-net
    ports:
      - "8080:80"

networks:
  ai-net:
    driver: bridge

volumes:
  dify-db-data:
  dify-redis-data:
  dify-qdrant-data:
  dify-storage:
  anythingllm-storage:
  ollama-data:
  webhook-db-data:
